<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus — Contact & Team</title>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================
   NEXUS — style.css
   Dark UI | Contact & Team Panel
   ============================================ */

      /* ---------- Reset & Base ---------- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }

      body {
        background: #0a0a0f;
        color: #e2e8f0;
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* ---------- Background Blobs ---------- */
      .bg-blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
      }

      .bg-blob--purple {
        width: 600px;
        height: 600px;
        top: -150px;
        left: -150px;
        background: radial-gradient(
          circle,
          rgba(192, 132, 252, 0.07),
          transparent 70%
        );
      }

      .bg-blob--blue {
        width: 500px;
        height: 500px;
        bottom: -100px;
        right: -100px;
        background: radial-gradient(
          circle,
          rgba(56, 189, 248, 0.06),
          transparent 70%
        );
      }

      /* ---------- Layout ---------- */
      .container {
        position: relative;
        z-index: 1;
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }

      /* ---------- Logo / Header ---------- */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 36px;
      }

      .logo-mark {
        font-size: 18px;
        color: #c084fc;
        line-height: 1;
      }

      .logo-text {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.25em;
        color: rgba(255, 255, 255, 0.85);
      }

      /* ---------- Toggle Bar ---------- */
      .bar {
        display: flex;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        overflow: hidden;
      }

      .bar-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 20px 28px;
        background: transparent;
        border: none;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.6);
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.04em;
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      .bar-btn:hover {
        color: #fff;
      }

      .bar-btn--contact:hover {
        background: rgba(192, 132, 252, 0.08);
      }

      .bar-btn--team:hover {
        background: rgba(56, 189, 248, 0.08);
      }

      .bar-btn.active {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
      }

      .bar-icon {
        font-size: 16px;
        opacity: 0.9;
      }

      .bar-label {
        font-size: 14px;
        letter-spacing: 0.05em;
      }

      .bar-chevron {
        font-size: 14px;
        opacity: 0.6;
        display: inline-block;
        transition: transform 0.3s ease;
      }

      .bar-chevron.rotated {
        transform: rotate(180deg);
      }

      .bar-divider {
        width: 1px;
        background: rgba(255, 255, 255, 0.07);
        margin: 8px 0;
        align-self: stretch;
      }

      /* ---------- Panel Wrapper ---------- */
      .panel-wrapper {
        margin-top: 6px;
      }

      /* ---------- Panel ---------- */
      .panel {
        display: none;
        border-radius: 0 0 14px 14px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-top: none;
        overflow: hidden;
        animation: fadeSlideDown 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .panel.open {
        display: block;
      }

      .panel-inner {
        padding: 40px 40px 44px;
      }

      .panel-header-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 36px;
      }

      .panel-eyebrow {
        font-family: "Syne", sans-serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: rgba(255, 255, 255, 0.3);
        font-weight: 600;
        margin-bottom: 6px;
      }

      .panel-title {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 26px;
        color: #fff;
        letter-spacing: -0.01em;
      }

      /* ---------- Accent Bar ---------- */
      .accent-bar {
        height: 3px;
        width: 60px;
        border-radius: 99px;
        margin-bottom: 4px;
      }

      .accent-bar--purple {
        background: linear-gradient(90deg, #c084fc, #a855f7);
      }

      .accent-bar--blue {
        background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      }

      /* ---------- Contact Form ---------- */
      .form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .label {
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.06em;
        font-family: "Syne", sans-serif;
      }

      .input {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 9px;
        padding: 13px 16px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        width: 100%;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .input::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .input:focus {
        border-color: #c084fc;
        box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.15);
      }

      .textarea {
        height: 110px;
        resize: vertical;
      }

      .submit-btn {
        align-self: flex-start;
        background: #c084fc;
        color: #1a0a2e;
        border: none;
        border-radius: 9px;
        padding: 14px 28px;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition:
          background 0.2s ease,
          transform 0.2s ease,
          box-shadow 0.2s ease;
        box-shadow: 0 4px 20px rgba(192, 132, 252, 0.25);
      }

      .submit-btn:hover {
        background: #a855f7;
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(192, 132, 252, 0.4);
      }

      /* ---------- Success State ---------- */
      .hidden {
        display: none !important;
      }

      .success-box {
        text-align: center;
        padding: 20px 0;
      }

      .success-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(192, 132, 252, 0.15);
        border: 2px solid rgba(192, 132, 252, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #c084fc;
        margin: 0 auto 20px;
      }

      .success-title {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 22px;
        color: #fff;
        margin-bottom: 12px;
      }

      .success-text {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 24px;
      }

      .highlight {
        color: #c084fc;
      }

      .reset-btn {
        background: transparent;
        border: 1px solid rgba(192, 132, 252, 0.4);
        border-radius: 8px;
        color: #c084fc;
        padding: 10px 22px;
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition:
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .reset-btn:hover {
        background: rgba(192, 132, 252, 0.08);
        border-color: #c084fc;
      }

      /* ---------- Team Scroll Nav ---------- */
      .scroll-nav {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .scroll-btn {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s ease,
          opacity 0.2s ease;
      }

      .scroll-btn:hover:not(:disabled) {
        background: rgba(56, 189, 248, 0.12);
        border-color: rgba(56, 189, 248, 0.4);
      }

      .scroll-btn:disabled {
        opacity: 0.25;
        cursor: default;
      }

      /* ---------- Scroll Track ---------- */
      .scroll-outer {
        position: relative;
        overflow: hidden;
      }

      .scroll-fade {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 60px;
        pointer-events: none;
        z-index: 2;
        transition: opacity 0.3s ease;
      }

      .scroll-fade--left {
        left: 0;
        background: linear-gradient(to right, #0d0d14, transparent);
        opacity: 0;
      }

      .scroll-fade--right {
        right: 0;
        background: linear-gradient(to left, #0d0d14, transparent);
        opacity: 1;
      }

      .scroll-track {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        scroll-behavior: smooth;
        padding-bottom: 8px;
        cursor: grab;
        -webkit-user-select: none;
        user-select: none;
        /* -webkit-overflow-scrolling: touch; */

        /* Hide scrollbar */
        -ms-overflow-style: none;
        /* scrollbar-width: none; */
      }
   
  
      .scroll-track::-webkit-scrollbar {
        display: none;
      }

      .scroll-track:active {
        cursor: grabbing;
      }

      /* ---------- Team Card ---------- */
      .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 26px 22px 22px;
        position: relative;
        transition:
          transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
          border-color 0.25s ease,
          box-shadow 0.25s ease;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
        min-width: 220px;
        max-width: 220px;
        flex-shrink: 0;
        animation: cardFadeIn 0.4s ease both;
      }

      .card:hover {
        transform: translateY(-8px) scale(1.02);
      }

      .card-glow {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 80px;
        pointer-events: none;
      }

      .card-bottom-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 0 0 14px 14px;
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .card:hover .card-bottom-line {
        opacity: 1;
      }

      /* ---------- Avatar ---------- */
      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.05em;
        flex-shrink: 0;
        transition: box-shadow 0.25s ease;
      }

      .card:hover .avatar {
        box-shadow: 0 0 20px var(--member-color-glow);
      }

      /* ---------- Member Info ---------- */
      .member-name {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: #fff;
        margin-bottom: 3px;
      }

      .member-role {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.04em;
        margin-bottom: 8px;
        font-family: "Syne", sans-serif;
      }

      .member-bio {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.35);
        line-height: 1.6;
      }

      /* ---------- Dot Row ---------- */
      .dot-row {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 20px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        transition:
          background 0.25s ease,
          transform 0.25s ease;
      }

      .dot.active {
        transform: scale(1.4);
      }

      /* ---------- Keyframe Animations ---------- */
      @keyframes fadeSlideDown {
        from {
          opacity: 0;
          transform: translateY(-16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes cardFadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 640px) {
        .container {
          padding: 24px 16px 60px;
        }

        .panel-inner {
          padding: 28px 20px 32px;
        }

        .form-row {
          grid-template-columns: 1fr;
        }

        .panel-title {
          font-size: 20px;
        }

        .bar-btn {
          padding: 16px 14px;
          gap: 8px;
        }

        .bar-label {
          font-size: 12px;
        }

        .card {
          min-width: 190px;
          max-width: 190px;
        }
      }

      @media (max-width: 400px) {
        .bar-label {
          display: none;
        }

        .bar-btn {
          padding: 16px 10px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background glow blobs -->
    <div class="bg-blob bg-blob--purple"></div>
    <div class="bg-blob bg-blob--blue"></div>

    <div class="container">
      <!-- Logo -->
      <header class="header">
        <span class="logo-mark">◆</span>
        <span class="logo-text">MR.VK</span>
      </header>

      <!-- Toggle Bar -->
      <div class="bar">
        <button
          class="bar-btn"
          id="btn-contact"
          onclick="togglePanel('contact')"
        >
          <span class="bar-icon">✉</span>
          <span class="bar-label">Contact Form</span>
          <span class="bar-chevron" id="chevron-contact">↓</span>
        </button>
        <div class="bar-divider"></div>
        <button class="bar-btn" id="btn-team" onclick="togglePanel('team')">
          <span class="bar-icon">◎</span>
          <span class="bar-label">Our Team</span>
          <span class="bar-chevron" id="chevron-team">↓</span>
        </button>
      </div>

      <!-- Panels Wrapper -->
      <div class="panel-wrapper">
        <!-- Contact Panel -->
        <div class="panel" id="panel-contact">
          <div class="panel-inner">
            <div class="panel-header-row">
              <div>
                <p class="panel-eyebrow">LET'S CONNECT</p>
                <h2 class="panel-title">Send us a message</h2>
              </div>
              <div class="accent-bar accent-bar--purple"></div>
            </div>

            <!-- Contact Form -->
            <form class="form" id="contact-form" onsubmit="handleSubmit(event)">
              <div class="form-row">
                <div class="form-group">
                  <label class="label" for="name">Full Name</label>
                  <input
                    class="input"
                    type="text"
                    id="name"
                    placeholder="Jane Doe"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="label" for="email">Email Address</label>
                  <input
                    class="input"
                    type="email"
                    id="email"
                    placeholder="jane@example.com"
                    required
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="label" for="message">Message</label>
                <textarea
                  class="input textarea"
                  id="message"
                  placeholder="Tell us about your project..."
                  required
                ></textarea>
              </div>
              <button type="submit" class="submit-btn">Send Message →</button>
            </form>

            <!-- Success State -->
            <div class="success-box hidden" id="success-box">
              <div class="success-icon">✓</div>
              <h3 class="success-title">Message Received!</h3>
              <p class="success-text">
                Thanks, <strong id="success-name" class="highlight"></strong>.
                We'll reach out to
                <strong id="success-email" class="highlight"></strong> within 24
                hours.
              </p>
              <button class="reset-btn" onclick="resetForm()">
                Send another message
              </button>
            </div>
          </div>
        </div>

        <!-- Team Panel -->
        <div class="panel" id="panel-team">
          <div class="panel-inner">
            <div class="panel-header-row">
              <div>
                <p class="panel-eyebrow">THE PEOPLE</p>
                <h2 class="panel-title">Meet our team</h2>
              </div>
              <div class="scroll-nav">
                <button
                  class="scroll-btn"
                  id="scroll-left"
                  onclick="scrollTeam(-1)"
                  disabled
                >
                  ←
                </button>
                <button
                  class="scroll-btn"
                  id="scroll-right"
                  onclick="scrollTeam(1)"
                >
                  →
                </button>
              </div>
            </div>

            <div class="scroll-outer">
              <div class="scroll-fade scroll-fade--left" id="fade-left"></div>
              <div class="scroll-fade scroll-fade--right" id="fade-right"></div>
              <div class="scroll-track" id="scroll-track">
                <!-- Cards injected by JS -->
              </div>
            </div>

            <div class="dot-row" id="dot-row">
              <!-- Dots injected by JS -->
            </div>
          </div>
        </div>
      </div>
      <!-- /panel-wrapper -->
    </div>
    <!-- /container -->

    <!-- <script src="script.js"></script> -->
    <script>
      /* ============================================
   NEXUS — script.js
   Contact & Team Panel Logic
   ============================================ */

      /* ---------- Team Data ---------- */
      const teamMembers = [
        {
          name: "Aria Voss",
          role: "Creative Director",
          avatar: "AV",
          color: "#c084fc",
        },
        {
          name: "Marcus Chen",
          role: "Lead Engineer",
          avatar: "MC",
          color: "#38bdf8",
          bio: "Full-stack architect obsessed with performance and clean systems.",
        },
        {
          name: "Selin Kaya",
          role: "UX Strategist",
          avatar: "SK",
          color: "#fb923c",
          bio: "Human-centered design advocate, ex-IDEO researcher.",
        },
        {
          name: "Jordan Blake",
          role: "Data Scientist",
          avatar: "JB",
          color: "#4ade80",
          bio: "Turns raw data into actionable product intelligence.",
        },
        {
          name: "Riya Nair",
          role: "Product Manager",
          avatar: "RN",
          color: "#f472b6",
          bio: "Ships zero-to-one products with obsessive user empathy.",
        },
        {
          name: "Theo Müller",
          role: "Motion Designer",
          avatar: "TM",
          color: "#fbbf24",
          bio: "Turns static ideas into living, breathing visual stories.",
        },
      ];

      /* ---------- State ---------- */
      let activePanel = null;

      /* ---------- Panel Toggle ---------- */
      function togglePanel(name) {
        const isSame = activePanel === name;

        // Close any open panel
        if (activePanel) {
          document
            .getElementById(`panel-${activePanel}`)
            .classList.remove("open");
          document
            .getElementById(`btn-${activePanel}`)
            .classList.remove("active");
          document
            .getElementById(`chevron-${activePanel}`)
            .classList.remove("rotated");
        }

        if (isSame) {
          activePanel = null;
          return;
        }

        // Open new panel
        activePanel = name;
        document.getElementById(`panel-${name}`).classList.add("open");
        document.getElementById(`btn-${name}`).classList.add("active");
        document.getElementById(`chevron-${name}`).classList.add("rotated");

        // Init team scroll state once opened
        if (name === "team") {
          initTeamScroll();
        }
      }

      /* ---------- Contact Form ---------- */
      function handleSubmit(e) {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();

        if (!name || !email) return;

        document.getElementById("success-name").textContent = name;
        document.getElementById("success-email").textContent = email;

        document.getElementById("contact-form").classList.add("hidden");
        document.getElementById("success-box").classList.remove("hidden");
      }

      function resetForm() {
        document.getElementById("contact-form").reset();
        document.getElementById("contact-form").classList.remove("hidden");
        document.getElementById("success-box").classList.add("hidden");
      }

      /* ---------- Team Cards ---------- */
      function buildTeamCards() {
        const track = document.getElementById("scroll-track");
        const dotRow = document.getElementById("dot-row");

        track.innerHTML = "";
        dotRow.innerHTML = "";

        teamMembers.forEach((member, i) => {
          /* Card */
          const card = document.createElement("div");
          card.className = "card";
          card.style.animationDelay = `${i * 0.07}s`;
          card.style.setProperty(
            "--member-color-glow",
            hexToRgba(member.color, 0.3),
          );

          card.addEventListener("mouseenter", () => {
            card.style.borderColor = member.color;
            card.style.boxShadow = `0 16px 48px ${hexToRgba(member.color, 0.16)}`;
            highlightDot(i, member.color);
          });

          card.addEventListener("mouseleave", () => {
            card.style.borderColor = "";
            card.style.boxShadow = "";
            resetDots();
          });

          card.innerHTML = `
      <div class="card-glow"
           style="background: radial-gradient(circle at 50% 0%, ${hexToRgba(member.color, 0.1)}, transparent 70%);">
      </div>

      <div class="avatar"
           style="background: ${hexToRgba(member.color, 0.12)};
                  border: 2px solid ${hexToRgba(member.color, 0.32)};
                  color: ${member.color};">
        ${member.avatar}
      </div>

      <div>
        <p class="member-name">${member.name}</p>
        <p class="member-role" style="color: ${member.color};">${member.role}</p>
        <p class="member-bio">${member.bio || ""}</p>
      </div>

      <div class="card-bottom-line"
           style="background: linear-gradient(90deg, ${member.color}, transparent);">
      </div>
    `;

          track.appendChild(card);

          /* Dot */
          const dot = document.createElement("div");
          dot.className = "dot";
          dot.id = `dot-${i}`;
          dotRow.appendChild(dot);
        });
      }

      function highlightDot(index, color) {
        teamMembers.forEach((_, i) => {
          const dot = document.getElementById(`dot-${i}`);
          if (!dot) return;
          if (i === index) {
            dot.style.background = color;
            dot.classList.add("active");
          } else {
            dot.style.background = "rgba(255,255,255,0.15)";
            dot.classList.remove("active");
          }
        });
      }

      function resetDots() {
        teamMembers.forEach((_, i) => {
          const dot = document.getElementById(`dot-${i}`);
          if (!dot) return;
          dot.style.background = "rgba(255,255,255,0.15)";
          dot.classList.remove("active");
        });
      }

      /* ---------- Team Scroller ---------- */
      function initTeamScroll() {
        buildTeamCards();

        const track = document.getElementById("scroll-track");
        const fadeLeft = document.getElementById("fade-left");
        const fadeRight = document.getElementById("fade-right");
        const btnLeft = document.getElementById("scroll-left");
        const btnRight = document.getElementById("scroll-right");

        /* Update fade & button states */
        function updateState() {
          const atLeft = track.scrollLeft <= 4;
          const atRight =
            track.scrollLeft >= track.scrollWidth - track.clientWidth - 4;

          fadeLeft.style.opacity = atLeft ? "0" : "1";
          fadeRight.style.opacity = atRight ? "0" : "1";

          btnLeft.disabled = atLeft;
          btnRight.disabled = atRight;
        }

        track.addEventListener("scroll", updateState);
        updateState();

        /* Drag to scroll */
        let isDragging = false;
        let dragStartX = 0;
        let scrollStart = 0;

        track.addEventListener("mousedown", (e) => {
          isDragging = true;
          dragStartX = e.clientX;
          scrollStart = track.scrollLeft;
          track.style.cursor = "grabbing";
        });

        document.addEventListener("mousemove", (e) => {
          if (!isDragging) return;
          const dx = e.clientX - dragStartX;
          track.scrollLeft = scrollStart - dx;
        });

        document.addEventListener("mouseup", () => {
          if (!isDragging) return;
          isDragging = false;
          track.style.cursor = "grab";
        });

        /* Touch support */
        let touchStartX = 0;
        let touchScrollStart = 0;

        track.addEventListener(
          "touchstart",
          (e) => {
            touchStartX = e.touches[0].clientX;
            touchScrollStart = track.scrollLeft;
          },
          { passive: true },
        );

        track.addEventListener(
          "touchmove",
          (e) => {
            const dx = e.touches[0].clientX - touchStartX;
            track.scrollLeft = touchScrollStart - dx;
          },
          { passive: true },
        );
      }

      /* ---------- Arrow Button Scroll ---------- */
      function scrollTeam(dir) {
        const track = document.getElementById("scroll-track");
        if (!track) return;
        track.scrollBy({ left: dir * 280, behavior: "smooth" });
      }

      /* ---------- Helpers ---------- */
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }
    </script>
  </body>
</html>
